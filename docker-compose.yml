version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: scholarflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  server:
    build: ./server
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/scholarflow
      NODE_ENV: production
    env_file:
      - .env
    ports:
      - '3001:3001'

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '80:80'

volumes:
  pgdata:
